name: async_wallpaper
description: Set wallpapers on Android asynchronously. Also supports video live wallpapers.
version: 3.1.0
homepage: https://www.hashstudios.in
repository: https://github.com/codenameakshay/async_wallpaper

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.41.4"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  pigeon: ^25.3.0

flutter:
  plugin:
    platforms:
      android:
        package: com.codenameakshay.async_wallpaper
        pluginClass: AsyncWallpaperPlugin
